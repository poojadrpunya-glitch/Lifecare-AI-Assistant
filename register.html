<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,0.5),
rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1584982751601-97dcc096659c');

background-size:cover;
font-family:Arial;
}

.register-box{

width:450px;

padding:40px;

border-radius:20px;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(10px);

color:white;
}

.btn-custom{

width:100%;

background:linear-gradient(90deg,#00c6ff,#0072ff);

border:none;

padding:12px;

border-radius:10px;

color:white;

font-weight:bold;
}

</style>

</head>

<body>

<div class="register-box">

<h2 class="text-center mb-4">
🏥 Lifecare AI Register
</h2>

<form method="post">

<input
type="text"
name="name"
class="form-control mb-3"
placeholder="Full Name"
required>

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Email"
required>

<input
type="text"
name="phone"
class="form-control mb-3"
placeholder="Phone Number"
required>

<select
name="gender"
class="form-control mb-3">

<option>Male</option>
<option>Female</option>

</select>

<select
name="pregnant"
class="form-control mb-3">

<option>No</option>
<option>Yes</option>

</select>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button class="btn-custom">
Register
</button>

</form>

<div class="text-center mt-3">

Already account?
<a href="/login" class="text-white">
Login
</a>

</div>

</div>

</body>
</html>
