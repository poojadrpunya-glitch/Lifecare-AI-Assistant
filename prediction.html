<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Disease Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:
linear-gradient(rgba(0,0,0,0.5),
rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1584515933487-779824d29309');

background-size:cover;

font-family:Arial;

min-height:100vh;

color:white;
}

.container-box{

width:90%;
max-width:900px;

margin:auto;
margin-top:40px;

padding:40px;

border-radius:20px;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(10px);
}

.title{
text-align:center;
margin-bottom:30px;
}

.form-select,
.form-control{

height:50px;

border:none;

border-radius:10px;
}

.btn-custom{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#00c6ff,#0072ff);

color:white;

font-size:18px;
font-weight:bold;
}

.result-box{

margin-top:40px;

padding:30px;

border-radius:20px;

background:rgba(255,255,255,0.2);
}

.back-btn{

position:absolute;
top:20px;
left:20px;
}

</style>

</head>

<body>

<a href="/dashboard" class="btn btn-light back-btn">
⬅ Dashboard
</a>

<div class="container-box">

<div class="title">

<h1>
🩺 AI Disease Prediction
</h1>

<p>
Select your symptoms and health conditions
</p>

</div>

<form method="post" action="/predict">

<!-- Fever -->

<div class="col-md-6">

<label>Do you have Fever?</label>

<select name="fever" class="form-select">

<option value="" selected disabled>
Select
</option>

<option>No</option>
<option>Yes</option>

</select>

</div>

<!-- Cough -->

<div class="col-md-6">

<label>Do you have Cough?</label>

<select name="cough" class="form-select">

<option value="" selected disabled>
Select
</option>

<option>No</option>
<option>Yes</option>

</select>

<!-- Headache -->

<div class="col-md-6">

<label>Do you have Headache?</label>

<select name="headache" class="form-select">

<option value="" selected disabled>
Select
</option>

<option>No</option>
<option>Yes</option>

</select>

</div>

<!-- Sugar -->

<div class="col-md-6">

<label>High Sugar Symptoms?</label>

<select name="sugar" class="form-select">

<option value="" selected disabled>
Select
</option>

<option>No</option>
<option>Yes</option>

</select>

</div>

<!-- BP -->

<div class="col-md-6">

<label>High BP Symptoms?</label>

<select name="bp" class="form-select">

<option value="" selected disabled>
Select
</option>

<option>No</option>
<option>Yes</option>

</select>

</div>

<!-- Heart -->

<div class="col-md-6">

<label>Chest Pain / Heart Symptoms?</label>

<select name="heart" class="form-select">

<option value="" selected disabled>
Select
</option>

<option>No</option>
<option>Yes</option>

</select>

</div>

<!-- Fatigue -->

<div class="col-md-6">

<label>Feeling Weakness / Fatigue?</label>

<select name="fatigue" class="form-select">

<option value="" selected disabled>
Select
</option>

<option>No</option>
<option>Yes</option>

</select>

</div>

<!-- Breathing -->

<div class="col-md-6">

<label>Breathing Problem?</label>

<select name="breathing" class="form-select">

<option value="" selected disabled>
Select
</option>

<option>No</option>
<option>Yes</option>

</select>

</div>

</div>

<button class="btn-custom mt-5">
Predict Disease
</button>

</form>

<!-- RESULT -->

{% if disease %}

<div class="result-box">

<h2>
📋 Prediction Result
</h2>

<hr>

<h4>
Disease:
{{disease}}
</h4>

<h4 class="mt-3">
💊 Medicine Suggestion
</h4>

<p>
{{medicine}}
</p>

<h4 class="mt-3">
🥗 Food Suggestion
</h4>

<p>
{{food}}
</p>

<h4 class="mt-3">
🧠 Health Advice
</h4>

<p>
{{advice}}
</p>

<h4 class="mt-3">
⚠ Probability
</h4>

<p>
{{probability}}
</p>

</div>

{% endif %}

</div>

</body>
</html>
